<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAMAR - Création d'Exercices</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #f0ede5;
            --nav-blue: #142d63;
            --panel-blue: #1d3557;
            --accent-orange: #f39200;
            --input-bg: #d1d5db;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-paper);
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 35px 35px;
            font-family: 'Roboto Condensed', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 100px;
        }

        /* --- HEADER & PAGINATION --- */
        .header { width: 100%; max-width: 420px; display: flex; align-items: center; padding: 20px; justify-content: space-between; }
        .btn-back { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #000; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .pagination { display: flex; align-items: center; gap: 20px; font-family: 'Anton', sans-serif; font-size: 1.5rem; margin: 10px 0; }

        /* --- ZONE VISUELLE --- */
        .preview-box { 
            width: 90%; max-width: 380px; height: 200px; 
            background-color: var(--panel-blue); 
            border: 2px solid white; border-radius: 15px; 
            margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-family: 'Anton', sans-serif;
        }

        .preview-question {
            text-align: center;
            padding: 20px;
        }
        
        .preview-question h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        /* --- PANNEAU CONFIGURATION --- */
        .config-panel { width: 95%; max-width: 400px; background-color: var(--panel-blue); border-radius: 20px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        
        .type-selector-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .select-btn { 
            background: var(--accent-orange); color: white; border: none; 
            border-radius: 10px; padding: 10px; font-family: 'Anton', sans-serif; 
            font-size: 0.9rem; cursor: pointer; text-transform: uppercase; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .select-btn.active {
            background: #4CAF50;
        }

        /* --- CONTENU DYNAMIQUE DES EXERCICES --- */
        .exercise-content { background: var(--input-bg); border-radius: 15px; padding: 15px; min-height: 120px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

        .qsm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .qsm-item { 
            background: var(--panel-blue); height: 40px; border-radius: 8px; 
            display: flex; align-items: center; justify-content: flex-end; 
            padding-right: 10px; position: relative; color: white;
        }
        .qsm-item.correct { border: 2px solid #4CAF50; }
        .qsm-item.wrong { border: 2px solid #F44336; }
        .check-icon { color: white; font-weight: bold; }

        .vrai-faux-btn { 
            width: 100%; background: var(--panel-blue); color: white; 
            padding: 10px; border-radius: 10px; font-family: 'Anton'; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 5px; cursor: pointer;
        }
        
        .vrai-faux-btn.selected { border: 3px solid #4CAF50; }
        
        .input-text-full { 
            width: 100%; height: 60px; border-radius: 10px; border: none; 
            background: white; padding: 10px; 
        }

        /* --- QUESTION INPUT --- */
        .question-input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-align: center;
        }

        /* --- FOOTER --- */
        .btn-suivant { 
            margin-top: 20px; background: var(--accent-orange); color: white; 
            border: none; border-radius: 12px; padding: 12px 60px; 
            font-family: 'Anton'; font-size: 1.2rem; cursor: pointer; 
            box-shadow: 0 5px 0px #b36b00; 
        }

        .btn-suivant:hover { transform: translateY(-2px); }
        .btn-suivant:active { transform: translateY(3px); box-shadow: none; }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; max-width: 450px; 
            background: var(--nav-blue); height: 60px; border-radius: 25px 25px 0 0; 
            display: flex; justify-content: space-around; align-items: center; 
            color: white; font-size: 0.7rem; font-weight: bold; 
        }
        .circle-plus { 
            position: absolute; top: -35px; width: 80px; height: 80px; 
            background: var(--bg-paper); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
        }
        .inner-plus { 
            width: 65px; height: 65px; background: var(--nav-blue); 
            border-radius: 50%; border: 3px solid var(--bg-paper); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 2.5rem; color: white; cursor: pointer;
        }
        .nav-link { cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <form id="questionForm" action="/prof/config_question/{{ mission.id }}" method="POST">
        <input type="hidden" name="question_type" id="question_type" value="qsm">
        
        <div class="header">
            <div class="btn-back" onclick="window.location.href='/prof/missions'"> ← </div>
            <div class="pagination"> ◀ <span id="step3">3</span> <span id="step2">2</span> <span id="step1" style="opacity:0.5;">1</span> ▶ </div>
            <div style="width: 40px;"></div>
        </div>

        <div class="preview-box" id="main-preview">
            <div class="preview-question">
                <h3 id="preview-title">Tapez votre question</h3>
                <div id="preview-content"></div>
            </div>
        </div>

        <div class="config-panel">
            <div class="type-selector-row">
                <button type="button" class="select-btn active" id="type-qsm" onclick="selectType('qsm')">QSM</button>
                <button type="button" class="select-btn" id="type-vrai-faux" onclick="selectType('vrai-faux')">VRAI/FAUX</button>
                <button type="button" class="select-btn" id="type-nombre" onclick="selectType('nombre')">NOMBRE</button>
            </div>

            <div class="type-selector-row">
                <button type="button" class="select-btn" onclick="selectTime('30')">30s</button>
                <button type="button" class="select-btn active" onclick="selectTime('60')">60s</button>
                <button type="button" class="select-btn" onclick="selectTime('120')">120s</button>
                <input type="hidden" name="time" id="time" value="60">
            </div>

            <div class="type-selector-row">
                <button type="button" class="select-btn" onclick="selectPoints('10')">10pts</button>
                <button type="button" class="select-btn active" onclick="selectPoints('20')">20pts</button>
                <button type="button" class="select-btn" onclick="selectPoints('50')">50pts</button>
                <input type="hidden" name="points" id="points" value="20">
            </div>

            <input type="text" name="question" id="question-input" class="question-input" placeholder="Tapez votre question ici..." oninput="updatePreview()">

            <div class="exercise-content" id="exercise-ui">
            </div>
        </div>

        <button type="submit" class="btn-suivant">SUIVANT</button>
    </form>

    {% include 'prof/bottom_nav.html' %}

    <script>
        let currentType = 'qsm';

        function selectType(type) {
            currentType = type;
            
            // Update buttons
            document.querySelectorAll('.type-selector-row:first-child .select-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById('type-' + type).classList.add('active');
            
            // Update hidden input
            document.getElementById('question_type').value = type;
            
            updateExerciseUI();
        }

        function selectTime(time) {
            const buttons = document.querySelectorAll('.type-selector-row:nth-child(2) .select-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('time').value = time;
        }

        function selectPoints(points) {
            const buttons = document.querySelectorAll('.type-selector-row:nth-child(3) .select-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('points').value = points;
        }

        function updatePreview() {
            const question = document.getElementById('question-input').value;
            document.getElementById('preview-title').textContent = question || 'Tapez votre question';
        }

        function updateExerciseUI() {
            const container = document.getElementById('exercise-ui');
            const preview = document.getElementById('preview-content');
            let html = '';

            if (currentType === 'qsm') {
                html = `
                    <div class="qsm-grid">
                        <div class="qsm-item wrong"><span class="check-icon">✖</span></div>
                        <div class="qsm-item correct"><span class="check-icon">✔</span></div>
                        <div class="qsm-item wrong"><span class="check-icon">✖</span></div>
                        <div class="qsm-item wrong"><span class="check-icon">✖</span></div>
                    </div>`;
                preview.innerHTML = `<div class="qsm-grid" style="width:80%;margin:0 auto;">
                    <div style="background:#444;height:30px;border-radius:5px;"></div>
                    <div style="background:#444;height:30px;border-radius:5px;"></div>
                    <div style="background:#444;height:30px;border-radius:5px;"></div>
                    <div style="background:#444;height:30px;border-radius:5px;"></div>
                </div>`;
            } 
            else if (currentType === 'vrai-faux') {
                html = `
                    <div style="width: 100%;">
                        <div class="vrai-faux-btn" onclick="selectVraiFaux(this, 'vrai')" style="border: 2px solid #4CAF50;">VRAI <span style="color:#4CAF50">✔</span></div>
                        <div class="vrai-faux-btn" onclick="selectVraiFaux(this, 'faux')" style="border: 2px solid #F44336;">FAUX <span style="color:#F44336">✖</span></div>
                    </div>`;
                preview.innerHTML = `<div style="display:flex;gap:20px;">
                    <div style="width:80px;height:40px;background:#444;border-radius:8px;"></div>
                    <div style="width:80px;height:40px;background:#444;border-radius:8px;"></div>
                </div>`;
            } 
            else if (currentType === 'nombre') {
                html = `<input type="number" name="answer" placeholder="Entrez le nombre" class="input-text-full" style="text-align:center; font-size:1.5rem;">`;
                preview.innerHTML = `<div style="width:100px;height:40px;background:#fff;border-radius:10px;"></div>`;
            }

            container.innerHTML = html;
        }

        function selectVraiFaux(btn, value) {
            document.querySelectorAll('.vrai-faux-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        // Initialize
        updateExerciseUI();
    </script>

</body>
</html>
