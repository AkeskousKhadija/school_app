<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QAMAR{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #f0ede5;
            --nav-blue: #142d63;
            --card-blue: #1d3557;
            --accent-orange: #f39200;
            --toggle-green: #66bb6a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-paper);
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 35px 35px;
            font-family: 'Roboto Condensed', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 100px;
        }

        /* --- HEADER --- */
        .header-nav {
            width: 100%;
            max-width: 420px;
            display: flex;
            align-items: center;
            padding: 20px;
        }

        .btn-back {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: 2px solid #000;
            background: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.5rem; font-weight: bold;
            box-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }

        h1 { flex-grow: 1; text-align: center; font-family: 'Anton', sans-serif; text-transform: uppercase; font-size: 1.4rem; }

        /* --- BARRE DE NAVIGATION --- */
        .bottom-nav-container {
            position: fixed; bottom: 0; width: 100%; max-width: 450px;
            height: 80px; display: flex; justify-content: center;
        }
        .nav-background {
            background: var(--nav-blue);
            width: 90%; height: 60px;
            align-self: flex-end;
            border-radius: 30px 30px 0 0;
            display: flex; justify-content: space-around; align-items: center;
            position: relative;
        }
        .nav-center-cutout {
            position: absolute; top: -35px;
            width: 85px; height: 85px;
            background: var(--bg-paper); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-plus-main {
            width: 70px; height: 70px;
            background: var(--nav-blue); border: 4px solid var(--bg-paper);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 2.5rem; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .nav-item { color: white; text-align: center; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        
        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    {% block content %}{% endblock %}

    <div class="bottom-nav-container">
        <div class="nav-background">
            <div class="nav-item" onclick="window.location.href='/prof/eleves'">Ajouter des élèves</div>
            <div class="nav-center-cutout">
                <div class="btn-plus-main" onclick="window.location.href='/prof/creer_mission'">+</div>
            </div>
            <div class="nav-item" onclick="window.location.href='/dashboard'">Profile</div>
        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
