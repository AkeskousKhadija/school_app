<!-- Bottom Navigation Bar for Professor Interface -->
{% if mission_id %}
<div class="bottom-nav-container" style="position: fixed; bottom: 0; width: 100%; max-width: 450px; height: 80px; display: flex; justify-content: center; z-index: 1000;">
    <div class="nav-background" style="background: #142d63; width: 90%; height: 60px; align-self: flex-end; border-radius: 30px 30px 0 0; display: flex; justify-content: space-around; align-items: center; position: relative;">
        <div class="nav-item" onclick="window.location.href='/prof/eleves'" style="color: white; text-align: center; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; cursor: pointer;">Ajouter des élèves</div>
        <div class="nav-center-cutout" style="position: absolute; top: -35px; width: 85px; height: 85px; background: #f0ede5; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <div class="btn-plus-main" onclick="window.location.href='/prof/config_question/{{ mission_id }}'" style="width: 70px; height: 70px; background: #142d63; border: 4px solid #f0ede5; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2.5rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">+</div>
        </div>
        <div class="nav-item" onclick="window.location.href='/dashboard'" style="color: white; text-align: center; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; cursor: pointer;">Profile</div>
    </div>
</div>
{% else %}
<div class="bottom-nav-container" style="position: fixed; bottom: 0; width: 100%; max-width: 450px; height: 80px; display: flex; justify-content: center; z-index: 1000;">
    <div class="nav-background" style="background: #142d63; width: 90%; height: 60px; align-self: flex-end; border-radius: 30px 30px 0 0; display: flex; justify-content: space-around; align-items: center; position: relative;">
        <div class="nav-item" onclick="window.location.href='/prof/eleves'" style="color: white; text-align: center; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; cursor: pointer;">Ajouter des élèves</div>
        <div class="nav-center-cutout" style="position: absolute; top: -35px; width: 85px; height: 85px; background: #f0ede5; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <div class="btn-plus-main" onclick="window.location.href='/prof/select_mission'" style="width: 70px; height: 70px; background: #142d63; border: 4px solid #f0ede5; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2.5rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">+</div>
        </div>
        <div class="nav-item" onclick="window.location.href='/dashboard'" style="color: white; text-align: center; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; cursor: pointer;">Profile</div>
    </div>
</div>
{% endif %}
