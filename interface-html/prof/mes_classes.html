<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAMAR - Mes Classes</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #f0ede5;
            --dark-blue: #1a237e;
            --class-blue: #1a237e;
            --class-orange: #f39200;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-paper);
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 35px 35px;
            font-family: 'Roboto Condensed', sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-nav {
            width: 100%;
            max-width: 400px;
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
        }

        .btn-back {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid #000;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }

        h1 {
            flex-grow: 1;
            text-align: center;
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .classes-grid {
            width: 100%;
            max-width: 400px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .class-card {
            border-radius: 20px;
            padding: 15px;
            color: white;
            position: relative;
            min-height: 180px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .class-card:active { transform: scale(0.95); }

        .blue { background-color: var(--class-blue); }
        .orange { background-color: var(--class-orange); }

        .class-thumb {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 70px;
            height: 50px;
            background: #333;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.2);
            background-image: url('https://cdn-icons-png.flaticon.com/512/2900/2900223.png');
            background-size: cover;
        }

        .class-info h3 {
            font-family: 'Anton', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .class-info p {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 2px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <div class="btn-back" onclick="window.history.back()"> < </div>
        <h1>MES CLASSES</h1>
    </div>

    <div class="classes-grid">
        <div class="class-card blue" onclick="window.location.href='/prof/classe_detail'">
            <div class="class-thumb"></div>
            <div class="class-info">
                <h3>CLASSES TITLE</h3>
                <p>NIVEAU : 4AEP</p>
                <p>NUMBER OF STUDENTS : 30</p>
            </div>
        </div>

        <div class="class-card orange" onclick="window.location.href='/prof/classe_detail'">
            <div class="class-thumb"></div>
            <div class="class-info">
                <h3>CLASSES TITLE</h3>
                <p>NIVEAU : 4AEP</p>
                <p>NUMBER OF STUDENTS : 30</p>
            </div>
        </div>

        <div class="class-card orange" onclick="window.location.href='/prof/classe_detail'">
            <div class="class-thumb"></div>
            <div class="class-info">
                <h3>CLASSES TITLE</h3>
                <p>NIVEAU : 4AEP</p>
                <p>NUMBER OF STUDENTS : 30</p>
            </div>
        </div>

        <div class="class-card blue" onclick="window.location.href='/prof/classe_detail'">
            <div class="class-thumb"></div>
            <div class="class-info">
                <h3>CLASSES TITLE</h3>
                <p>NIVEAU : 4AEP</p>
                <p>NUMBER OF STUDENTS : 30</p>
            </div>
        </div>
    </div>

    {% include 'prof/bottom_nav.html' %}

</body>
</html>
