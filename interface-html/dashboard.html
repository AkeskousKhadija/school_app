<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AX_Kids - Dashboard Bleu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Palette de Bleus inspirée de l'image */
            --blue-light: #e3f2fd;
            --blue-medium: #4a90e2;
            --blue-dark: #1a4a7a;
            --blue-path: #a2e4ff;
            
            --blue-college: #64b5f6;
            --blue-lycee: #3949ab;
            
            --text-main: #2c3e50;
            --glass: rgba(255, 255, 255, 0.85);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f8ff;
            color: var(--text-main);
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* Thèmes de Background basés sur les degrés de bleu */
        body.niveau-primaire { background-color: #e1f5fe; }
        body.niveau-college { background-color: #bbdefb; }
        body.niveau-lycee { background-color: #c5cae9; }

        .app-shell {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
        }

        /* Sidebar Style */
        .sidebar {
            background: white;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background: var(--blue-path);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
        }

        .nav-item {
            padding: 15px;
            margin: 8px 0;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
            color: #7f8c8d;
        }

        .nav-item:hover { background: #f8f9fa; color: var(--blue-medium); }
        
        .nav-item.active { 
            background: var(--blue-medium); 
            color: white; 
        }
        
        body.niveau-college .nav-item.active { background: var(--blue-college); }
        body.niveau-lycee .nav-item.active { background: var(--blue-lycee); }

        /* Main Content */
        .main-content {
            position: relative;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-bar {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .level-selector {
            display: flex;
            background: var(--glass);
            padding: 8px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            gap: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .level-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            color: #888;
            transition: var(--transition);
        }

        .level-btn.active {
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .level-btn.active.level-primaire { color: #03a9f4; }
        .level-btn.active.level-college { color: #2196f3; }
        .level-btn.active.level-lycee { color: #3f51b5; }

        /* Roadmap SVG */
        .map-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 850px;
        }

        .roadmap-svg {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .path-line {
            fill: none;
            stroke: var(--blue-path);
            stroke-width: 50;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.6;
            transition: stroke 0.5s ease;
        }

        body.niveau-college .path-line { stroke: #90caf9; }
        body.niveau-lycee .path-line { stroke: #9fa8da; }

        /* Level Cards */
        .level-card {
            position: absolute;
            width: 200px;
            background: white;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
        }

        .level-card:hover { transform: scale(1.1) translateY(-5px); }

        .card-preview {
            height: 110px;
            border-radius: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            background: #f0f7ff;
        }

        .card-title {
            font-size: 14px;
            font-weight: 900;
            color: var(--blue-dark);
        }

        /* Status Badges */
        .status-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .status-badge.completed { background: #4fc3f7; color: white; }
        .status-badge.locked { background: #b0bec5; color: white; }
        .status-badge.current { background: #2196f3; color: white; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(33, 150, 243, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(33, 150, 243, 0); }
        }

        .energy-bar {
            margin-top: auto;
            background: #e3f2fd;
            padding: 15px;
            border-radius: 20px;
            border: 1px solid #bbdefb;
        }
    </style>
</head>
<body id="body-context" class="niveau-primaire">

    <div class="app-shell">
        <aside class="sidebar">
            <div class="user-profile">
                <div class="avatar">👦</div>
                <div>
                    <h3 id="username-display">Léa_Explorer</h3>
                    <span id="level-label" style="font-size: 12px; color: #03a9f4; font-weight: bold;">Niveau Primaire</span>
                </div>
            </div>

            <ul class="nav-menu">
                <li class="nav-item active"><i class="fas fa-map-signs"></i> Mon Parcours</li>
                <li class="nav-item"><i class="fas fa-envelope"></i> Messages</li>
                <li class="nav-item"><i class="fas fa-bell"></i> Notifications</li>
                <li class="nav-item"><i class="fas fa-chart-line"></i> Mes Progrès</li>
            </ul>

            <div class="energy-bar">
                <p style="font-size: 13px; color: #1a4a7a;"><strong>Score: 1250 XP</strong></p>
                <div style="width: 100%; height: 8px; background: white; border-radius: 4px; margin-top: 5px; overflow: hidden;">
                    <div style="width: 65%; height: 100%; background: #03a9f4;"></div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                
                <div class="level-selector">
                    <button class="level-btn active level-primaire" onclick="setTheme('primaire')">Primaire</button>
                    <button class="level-btn level-college" onclick="setTheme('college')">Collège</button>
                    <button class="level-btn level-lycee" onclick="setTheme('lycee')">Lycée</button>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button style="background: white; border: none; padding: 10px; border-radius: 12px; cursor: pointer; color: var(--blue-medium);">
                        <i class="fas fa-cog"></i>
                    </button>
                    <button onclick="logout()" style="background: #ef5350; border: none; padding: 10px 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer;">
                        Déconnexion
                    </button>
                </div>
            </div>

            <div class="map-container">
                <svg class="roadmap-svg" viewBox="0 0 900 800">
                    <path class="path-line" d="M 450,50 C 100,200 800,300 450,450 S 100,700 450,850" />
                </svg>

                <div class="level-card" style="top: 20px; left: 40%;">
                    <div class="status-badge completed"><i class="fas fa-check"></i></div>
                    <div class="card-preview">🧮</div>
                    <div class="card-title">Maths Quests</div>
                </div>

                <div class="level-card" style="top: 220px; left: 15%;">
                    <div class="status-badge completed"><i class="fas fa-check"></i></div>
                    <div class="card-preview">📖</div>
                    <div class="card-title">Word Adventures</div>
                </div>

                <div class="level-card" style="top: 420px; left: 40%;">
                    <div class="status-badge current"><i class="fas fa-play"></i></div>
                    <div class="card-preview">🚀</div>
                    <div class="card-title">Science Explorers</div>
                </div>

                <div class="level-card" style="top: 620px; left: 65%;">
                    <div class="status-badge locked"><i class="fas fa-lock"></i></div>
                    <div class="card-preview" style="background: #eceff1;">🏛️</div>
                    <div class="card-title">History Mystery</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function setTheme(level) {
            const body = document.getElementById('body-context');
            const label = document.getElementById('level-label');
            
            body.className = 'niveau-' + level;

            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.level-btn.level-' + level).classList.add('active');

            const config = {
                'primaire': { name: 'Niveau Primaire', color: '#03a9f4' },
                'college': { name: 'Niveau Collège', color: '#2196f3' },
                'lycee': { name: 'Niveau Lycée', color: '#3f51b5' }
            };

            label.textContent = config[level].name;
            label.style.color = config[level].color;
        }
        
        async function logout() {
            try {
                const response = await fetch('/api/logout');
                const data = await response.json();
                window.location.href = data.redirect;
            } catch (error) {
                // Simulation locale
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
