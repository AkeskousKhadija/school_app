<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAMAR - Admin Dashboard</title>
    <style>
        :root {
            --bg-paper: #f2efea;
            --grid-line: #d1cfc9;
            --primary-blue: #3a98c7;
            --dark-blue: #1a2e78;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg-paper);
            font-family: 'Arial', sans-serif;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .header {
            background-color: var(--dark-blue);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-family: 'Impact', sans-serif;
            font-size: 1.8rem;
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: var(--dark-blue);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stat-card p {
            color: #666;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .menu-item {
            background-color: var(--primary-blue);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            font-family: 'Impact', sans-serif;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .menu-item:hover {
            transform: scale(1.05);
        }

        .logout {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="header">
        <h1>ADMIN - QAMAR</h1>
        <a href="/logout" class="logout">Déconnexion</a>
    </div>

    <div class="container">
        <h2>Bienvenue, Administrateur</h2>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>150</h3>
                <p>Élèves</p>
            </div>
            <div class="stat-card">
                <h3>25</h3>
                <p>Professeurs</p>
            </div>
            <div class="stat-card">
                <h3>10</h3>
                <p>Écoles</p>
            </div>
            <div class="stat-card">
                <h3>500</h3>
                <p>Parties jouées</p>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-item">Gestion Utilisateurs</div>
            <div class="menu-item">Statistiques</div>
            <div class="menu-item">Paramètres</div>
            <div class="menu-item">Rapports</div>
        </div>
    </div>
</body>
</html>
