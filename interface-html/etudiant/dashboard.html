<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAMAR - Élève Dashboard</title>
    <style>
        :root {
            --bg-paper: #f2efea;
            --grid-line: #d1cfc9;
            --primary-blue: #3a98c7;
            --dark-blue: #1a2e78;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg-paper);
            font-family: 'Arial', sans-serif;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .header {
            background-color: var(--dark-blue);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-family: 'Impact', sans-serif;
            font-size: 1.8rem;
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .welcome {
            text-align: center;
            margin-bottom: 20px;
        }

        .welcome h2 {
            color: var(--dark-blue);
        }

        .level-info {
            background-color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .game-card {
            background-color: var(--primary-blue);
            color: white;
            padding: 25px 15px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            font-family: 'Impact', sans-serif;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .game-card:hover {
            transform: scale(1.05);
        }

        .game-card .icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 10px;
        }

        .progress-section {
            margin-top: 30px;
        }

        .progress-bar {
            background-color: white;
            border-radius: 15px;
            padding: 15px;
            margin-top: 10px;
        }

        .progress-fill {
            height: 20px;
            background-color: #4CAF50;
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s;
        }

        .logout {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="header">
        <h1>QAMAR - École</h1>
        <a href="/logout" class="logout">Déconnexion</a>
    </div>

    <div class="container">
        <div class="welcome">
            <h2>Bienvenue, {{ username }}!</h2>
        </div>

        <div class="level-info">
            <h3>Niveau: {{ user_level|title }}</h3>
        </div>
        
        <h3>Choisis un jeu:</h3>
        <div class="games-grid">
            <div class="game-card" onclick="playGame('quiz')">
                <span class="icon">🎯</span>
                Quiz
            </div>
            <div class="game-card" onclick="playGame('memory')">
                <span class="icon">🧠</span>
                Mémoire
            </div>
            <div class="game-card" onclick="playGame('math')">
                <span class="icon">🔢</span>
                Maths
            </div>
        </div>

        <div class="progress-section">
            <h3>Ta progression:</h3>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 45%;"></div>
            </div>
            <p style="text-align: center; margin-top: 10px;">45% complété</p>
        </div>
    </div>

    <script>
        function playGame(game) {
            alert("Jeu " + game + " bientôt disponible!");
        }
    </script>
</body>
</html>
